<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recovery Roadmap — FinVitals by FinMango</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', -apple-system, sans-serif; background: #fefefe; color: #3a3a3a; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const PHASES = [
  { id: "immediate", label: "First 72 Hours", timeframe: "Days 1–3", color: "#c4553a", steps: [
    { name: "Document everything", desc: "Take photos/videos of all damage before any cleanup. This evidence is critical for every application that follows.", type: "action", programs: [] },
    { name: "File insurance claim", desc: "Contact your insurance company immediately. FEMA will not process most assistance until you have an insurance settlement or denial letter.", type: "critical", programs: ["Homeowner's/Renter's Insurance"], dependency: "Blocks FEMA inspection" },
    { name: "Emergency food & shelter", desc: "Red Cross shelters, food banks, and community organizations provide immediate help. No application needed.", type: "action", programs: ["Red Cross", "Food Banks", "Community Orgs"] },
    { name: "Emergency prescriptions", desc: "If you lost medications, visit any participating pharmacy with your disaster area ZIP code. EPAP provides up to 30-day emergency supply.", type: "health", programs: ["Emergency Prescription Assistance (EPAP)"] },
    { name: "Call utilities", desc: "Report outages and ask about disaster moratorium on disconnections and late fees.", type: "action", programs: ["Utility Moratorium"] },
  ]},
  { id: "week1", label: "Week 1", timeframe: "Days 3–7", color: "#d4933a", steps: [
    { name: "Apply for FEMA assistance", desc: "Apply online at DisasterAssistance.gov, via the FEMA app, or call 1-800-621-3362. This starts your 60-day clock for most programs.", type: "critical", programs: ["FEMA IHP", "Serious Needs Assistance"], dependency: "Opens access to all FEMA programs" },
    { name: "Request Serious Needs payment", desc: "If your home is uninhabitable, you may receive $750 immediately — often before the inspection. Automatic when you apply.", type: "financial", programs: ["FEMA Serious Needs Assistance"] },
    { name: "Apply for emergency Medicaid", desc: "If you lost health insurance due to job loss, apply for emergency Medicaid or request a Special Enrollment Period at HealthCare.gov.", type: "health", programs: ["Emergency Medicaid", "ACA Special Enrollment"] },
    { name: "Contact crisis counseling", desc: "Free, confidential support. Call the Disaster Distress Helpline 1-800-985-5990. No diagnosis or insurance needed.", type: "health", programs: ["FEMA Crisis Counseling Program"] },
    { name: "Check for D-SNAP", desc: "Disaster SNAP provides food benefits to households that wouldn't normally qualify. Window is typically only 7 days.", type: "food", programs: ["Disaster SNAP (D-SNAP)"] },
  ]},
  { id: "month1", label: "First Month", timeframe: "Days 7–30", color: "#2a6b9b", steps: [
    { name: "Complete SBA loan application", desc: "Critical even if you don't want a loan. FEMA requires SBA application before they'll consider you for personal property and transportation assistance. Denial by SBA can unlock additional FEMA grants.", type: "critical", programs: ["SBA Disaster Loan"], dependency: "Required for FEMA personal property assistance" },
    { name: "FEMA home inspection", desc: "After you apply, FEMA will schedule an inspection. Be present. Show all damage. The inspector's report determines your assistance amount.", type: "financial", programs: ["FEMA IHP — Housing Assistance"] },
    { name: "Apply for Disaster Unemployment", desc: "If you lost your job or can't work due to the disaster, apply within 30 days. Covers employees and self-employed.", type: "financial", programs: ["Disaster Unemployment Assistance"] },
    { name: "Contact Disaster Legal Services", desc: "Free legal help for insurance disputes, landlord issues, contractor fraud, FEMA appeals, and replacing lost documents.", type: "action", programs: ["FEMA Disaster Legal Services"] },
    { name: "Request mortgage forbearance", desc: "If you have a federally-backed mortgage, request up to 12 months of paused or reduced payments.", type: "financial", programs: ["Mortgage Forbearance"] },
  ]},
  { id: "months2_6", label: "Months 2–6", timeframe: "Recovery phase", color: "#2a7d5b", steps: [
    { name: "Receive insurance settlement", desc: "Forward your settlement or denial letter to FEMA immediately. FEMA can then process assistance for gaps not covered by insurance.", type: "critical", programs: ["Insurance → FEMA gap coverage"], dependency: "Unlocks FEMA supplemental assistance" },
    { name: "SBA loan decision", desc: "If approved, accept or decline. If denied, SBA refers you back to FEMA for additional personal property and transportation assistance.", type: "financial", programs: ["SBA → FEMA referral"] },
    { name: "Appeal FEMA decisions", desc: "If you disagree with FEMA's determination, you have 60 days from the decision letter to appeal with new evidence and documentation.", type: "action", programs: ["FEMA Appeals Process"] },
    { name: "State emergency funds", desc: "Many states offer additional assistance beyond federal programs. Check with your state emergency management agency.", type: "financial", programs: ["State Emergency Funds"] },
    { name: "Ongoing health support", desc: "FEMA's Crisis Counseling Program can extend for months. Check if Medicaid or marketplace coverage can continue your care.", type: "health", programs: ["Crisis Counseling", "Medicaid Continuation"] },
  ]},
  { id: "longterm", label: "6+ Months", timeframe: "Long-term recovery", color: "#7a7a7a", steps: [
    { name: "CDBG-DR grants", desc: "Congressional disaster recovery funding through HUD. Can take 1–3+ years to become available. Covers housing rehabilitation, infrastructure, and economic recovery.", type: "financial", programs: ["CDBG — Disaster Recovery"] },
    { name: "Hazard Mitigation grants", desc: "FEMA's HMGP funds projects to reduce future risk — elevation, retrofit, relocation. Available after major disaster declarations.", type: "financial", programs: ["FEMA HMGP"] },
    { name: "Tax casualty loss deduction", desc: "Claim unreimbursed disaster losses on your federal tax return. You can amend the prior year's return for faster refund.", type: "financial", programs: ["IRS Casualty Loss Deduction"] },
    { name: "Continued case management", desc: "Long-term disaster case management programs help navigate ongoing recovery. Operated by nonprofits funded through FEMA.", type: "action", programs: ["Disaster Case Management"] },
  ]},
];

const icons = { critical: "⚡", financial: "💰", health: "🏥", food: "🍎", action: "📋" };

function App() {
  const [expandedPhase, setExpandedPhase] = useState("immediate");
  const [expandedStep, setExpandedStep] = useState(null);

  return (
    <div style={{ maxWidth: 720, margin: "0 auto", padding: "24px 20px" }}>
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <h1 style={{ fontFamily: "Caveat, cursive", fontSize: 42, fontWeight: 700, color: "#1a1a1a", marginBottom: 4 }}>finvitals</h1>
        <p style={{ color: "#2a6b9b", fontSize: 14, marginBottom: 16 }}>recovery roadmap</p>
        <p style={{ color: "#3a3a3a", fontSize: 15, lineHeight: 1.6, maxWidth: 520, margin: "0 auto" }}>
          After a disaster, dozens of programs activate — but they have to be filed in a specific order. This roadmap shows you what to do, when, and why the sequence matters.
        </p>
      </div>

      <div style={{ background: "#fdf0ec", border: "1px solid #f5d5cc", borderRadius: 6, padding: "14px 18px", marginBottom: 28, display: "flex", gap: 12, alignItems: "flex-start" }}>
        <span style={{ fontSize: 18 }}>⚠</span>
        <div>
          <p style={{ fontSize: 13, fontWeight: 600, color: "#c4553a", marginBottom: 2 }}>Order matters</p>
          <p style={{ fontSize: 12, color: "#7a6a6a", lineHeight: 1.5 }}>Filing in the wrong order can delay or disqualify you. Insurance must come before FEMA inspection. SBA application is required before certain FEMA grants. This roadmap shows the correct sequence.</p>
        </div>
      </div>

      <div style={{ position: "relative" }}>
        <div style={{ position: "absolute", left: 24, top: 0, bottom: 0, width: 2, background: "#e8e8e8", zIndex: 0 }} />

        {PHASES.map((phase) => {
          const isExp = expandedPhase === phase.id;
          return (
            <div key={phase.id} style={{ position: "relative", marginBottom: 8 }}>
              <button onClick={() => setExpandedPhase(isExp ? null : phase.id)}
                style={{ display: "flex", alignItems: "center", gap: 16, width: "100%", padding: "14px 16px 14px 0", background: "none", border: "none", cursor: "pointer", textAlign: "left" }}>
                <div style={{ width: 50, height: 50, borderRadius: "50%", background: isExp ? phase.color : "white", border: `2.5px solid ${phase.color}`, display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1, flexShrink: 0, transition: "all 0.2s" }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: isExp ? "white" : phase.color }}>{phase.steps.length}</span>
                </div>
                <div style={{ flex: 1 }}>
                  <p style={{ fontSize: 18, fontWeight: 600, color: "#1a1a1a", marginBottom: 2 }}>{phase.label}</p>
                  <p style={{ fontSize: 12, color: "#7a7a7a" }}>{phase.timeframe} · {phase.steps.length} action items</p>
                </div>
                <span style={{ fontSize: 20, color: "#d0d0d0", transition: "transform 0.2s", transform: isExp ? "rotate(180deg)" : "rotate(0)" }}>▾</span>
              </button>

              {isExp && (
                <div style={{ marginLeft: 66, paddingBottom: 16 }}>
                  {phase.steps.map((step, si) => {
                    const sk = `${phase.id}-${si}`;
                    const isSE = expandedStep === sk;
                    return (
                      <div key={si} style={{ marginBottom: 6 }}>
                        <button onClick={() => setExpandedStep(isSE ? null : sk)}
                          style={{ width: "100%", textAlign: "left", padding: "12px 16px", background: isSE ? "#fafafa" : "white", border: isSE ? `1.5px solid ${phase.color}22` : "1px solid #e8e8e8", borderRadius: 6, cursor: "pointer", transition: "all 0.15s" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <span style={{ fontSize: 16 }}>{icons[step.type] || "📋"}</span>
                            <span style={{ fontSize: 14, fontWeight: 500, color: "#1a1a1a", flex: 1 }}>{step.name}</span>
                            {step.dependency && <span style={{ fontSize: 10, padding: "2px 8px", background: "#fdf0ec", color: "#c4553a", borderRadius: 8, fontWeight: 600, whiteSpace: "nowrap" }}>dependency</span>}
                            <span style={{ fontSize: 14, color: "#d0d0d0", transition: "transform 0.2s", transform: isSE ? "rotate(180deg)" : "rotate(0)" }}>▾</span>
                          </div>
                        </button>
                        {isSE && (
                          <div style={{ padding: "12px 16px 16px", marginTop: -1, border: `1px solid ${phase.color}22`, borderTop: "none", borderRadius: "0 0 6px 6px", background: "#fafafa" }}>
                            <p style={{ fontSize: 13, color: "#3a3a3a", lineHeight: 1.6, marginBottom: 10 }}>{step.desc}</p>
                            {step.dependency && <p style={{ fontSize: 12, color: "#c4553a", fontWeight: 500, marginBottom: 8, padding: "6px 10px", background: "#fdf0ec", borderRadius: 4, display: "inline-block" }}>🔗 {step.dependency}</p>}
                            {step.programs.length > 0 && (
                              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 4 }}>
                                {step.programs.map((prog, pi) => <span key={pi} style={{ fontSize: 11, padding: "3px 10px", background: "#e4f0fa", color: "#2a6b9b", borderRadius: 10 }}>{prog}</span>)}
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ background: "#f2f8fc", border: "1px solid #e4f0fa", borderRadius: 6, padding: "18px 22px", marginTop: 28, marginBottom: 20 }}>
        <p style={{ fontSize: 14, fontWeight: 600, color: "#2a6b9b", marginBottom: 6 }}>Why this roadmap exists</p>
        <p style={{ fontSize: 13, color: "#3a3a3a", lineHeight: 1.6 }}>The federal government spent $347 billion on disaster recovery over the past 30 years. But the average housing recovery still takes 3.5 to 6 years — largely because families navigate these programs alone, in the wrong order, and miss critical deadlines. FinVitals automates this entire sequence.</p>
      </div>

      <div style={{ textAlign: "center" }}>
        <p style={{ fontSize: 11, color: "#aaa", lineHeight: 1.6, maxWidth: 500, margin: "0 auto 16px" }}>This roadmap provides general guidance for federally declared disasters. Specific programs, deadlines, and eligibility vary by disaster declaration and location. Not legal or financial advice.</p>
      </div>
      <div style={{ textAlign: "center", marginTop: 16, paddingTop: 16, borderTop: "1px solid #e8e8e8" }}>
        <p style={{ fontSize: 11, color: "#aaa" }}>FinVitals by <a href="https://finmango.org" style={{ color: "#2a6b9b", textDecoration: "none" }}>FinMango</a> · 501(c)(3)</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
